# Virtual Smart Air Quality Gateway - Đề tài 4 (IT6130)
# Tất cả service nằm chung 1 network 'air-net', gọi nhau bằng TÊN service (DNS nội bộ),
# tuyệt đối không dùng localhost (mỗi container có localhost riêng).

services:
  # ----------------------------------------------------------------------- #
  # MQTT broker
  # ----------------------------------------------------------------------- #
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks: [air-net]
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------- #
  # InfluxDB (time-series database)
  # ----------------------------------------------------------------------- #
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    networks: [air-net]
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------- #
  # Grafana (dashboard edge)
  # ----------------------------------------------------------------------- #
  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      # Cho phép dùng biến ${INFLUXDB_*} bên trong file provisioning.
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    networks: [air-net]

  # ----------------------------------------------------------------------- #
  # Edge gateway: AQI + rule engine + InfluxDB writer + ThingsBoard gateway
  # ----------------------------------------------------------------------- #
  air-gateway:
    build: ./services/gateway
    container_name: air-gateway
    environment:
      CITY_ID: ${CITY_ID}
      MQTT_BROKER: ${MQTT_BROKER}
      MQTT_PORT: ${MQTT_PORT}
      INFLUXDB_URL: ${INFLUXDB_URL}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      TB_ENABLED: ${TB_ENABLED}
      TB_HOST: ${TB_HOST}
      TB_PORT: ${TB_PORT}
      TB_GATEWAY_TOKEN: ${TB_GATEWAY_TOKEN}
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks: [air-net]
    restart: unless-stopped

  # ----------------------------------------------------------------------- #
  # Virtual sensors (3 trạm)
  # ----------------------------------------------------------------------- #
  sensor-station-01:
    build: ./services/sensor
    container_name: sensor-station-01
    environment:
      CITY_ID: ${CITY_ID}
      STATION_ID: station-01
      DEVICE_ID: sensor-station-01
      MQTT_BROKER: ${MQTT_BROKER}
      MQTT_PORT: ${MQTT_PORT}
      PUBLISH_INTERVAL: ${PUBLISH_INTERVAL}
    depends_on:
      mosquitto:
        condition: service_healthy
    networks: [air-net]
    restart: unless-stopped

  sensor-station-02:
    build: ./services/sensor
    container_name: sensor-station-02
    environment:
      CITY_ID: ${CITY_ID}
      STATION_ID: station-02
      DEVICE_ID: sensor-station-02
      MQTT_BROKER: ${MQTT_BROKER}
      MQTT_PORT: ${MQTT_PORT}
      PUBLISH_INTERVAL: ${PUBLISH_INTERVAL}
    depends_on:
      mosquitto:
        condition: service_healthy
    networks: [air-net]
    restart: unless-stopped

  sensor-station-03:
    build: ./services/sensor
    container_name: sensor-station-03
    environment:
      CITY_ID: ${CITY_ID}
      STATION_ID: station-03
      DEVICE_ID: sensor-station-03
      MQTT_BROKER: ${MQTT_BROKER}
      MQTT_PORT: ${MQTT_PORT}
      PUBLISH_INTERVAL: ${PUBLISH_INTERVAL}
    depends_on:
      mosquitto:
        condition: service_healthy
    networks: [air-net]
    restart: unless-stopped

  # ----------------------------------------------------------------------- #
  # Virtual actuators (3 trạm)
  # ----------------------------------------------------------------------- #
  actuator-station-01:
    build: ./services/actuator
    container_name: actuator-station-01
    environment:
      CITY_ID: ${CITY_ID}
      STATION_ID: station-01
      DEVICE_ID: actuator-station-01
      MQTT_BROKER: ${MQTT_BROKER}
      MQTT_PORT: ${MQTT_PORT}
    depends_on:
      mosquitto:
        condition: service_healthy
    networks: [air-net]
    restart: unless-stopped

  actuator-station-02:
    build: ./services/actuator
    container_name: actuator-station-02
    environment:
      CITY_ID: ${CITY_ID}
      STATION_ID: station-02
      DEVICE_ID: actuator-station-02
      MQTT_BROKER: ${MQTT_BROKER}
      MQTT_PORT: ${MQTT_PORT}
    depends_on:
      mosquitto:
        condition: service_healthy
    networks: [air-net]
    restart: unless-stopped

  actuator-station-03:
    build: ./services/actuator
    container_name: actuator-station-03
    environment:
      CITY_ID: ${CITY_ID}
      STATION_ID: station-03
      DEVICE_ID: actuator-station-03
      MQTT_BROKER: ${MQTT_BROKER}
      MQTT_PORT: ${MQTT_PORT}
    depends_on:
      mosquitto:
        condition: service_healthy
    networks: [air-net]
    restart: unless-stopped

  # ----------------------------------------------------------------------- #
  # REST API (FastAPI)
  # ----------------------------------------------------------------------- #
  air-api:
    build: ./services/api
    container_name: air-api
    ports:
      - "8000:8000"
    environment:
      MQTT_BROKER: ${MQTT_BROKER}
      MQTT_PORT: ${MQTT_PORT}
    depends_on:
      mosquitto:
        condition: service_healthy
    networks: [air-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5

networks:
  air-net:
    driver: bridge

volumes:
  mosquitto-data:
  mosquitto-log:
  influxdb-data:
  influxdb-config:
  grafana-data:
